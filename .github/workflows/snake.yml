name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Snake Animation
        uses: Platane/snk@v3
        with:
          github_user_name: MrEddie7
          # As cores são passadas como parâmetros na URL do output
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#ff0000&color_dots=#ebedf0,#d1d5da,#959da5,#586069,#24292e
            dist/github-contribution-grid-snake-dark.svg?color_snake=#ff0000&color_dots=#161b22,#3a3f45,#5c636a,#828a93,#aab3bc

      - name: Push to Output Branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
