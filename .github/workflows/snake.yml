name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *" # Runs daily at midnight
  workflow_dispatch:    # Allows manual triggering from the Actions tab

# Explicitly grant permissions for the GITHUB_TOKEN to push to the output branch
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # Updated to v4 for Node 20 support

      - name: Generate Snake Animation
        uses: Platane/snk@v3 # Pinned to v3 for stability instead of @master
        with:
          github_user_name: MrEddie7
          # The outputs syntax allows generating multiple files (like dark mode)
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push to Output Branch
        uses: crazy-max/ghaction-github-pages@v4 # Updated to v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
